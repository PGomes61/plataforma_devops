name: CI Pipeline

# 1. Os Gatilhos: Quando este robô deve acordar?
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Compilar Microsserviços
    runs-on: ubuntu-latest # Executa em uma máquina virtual Linux novinha

    steps:
      # 2. Faz o download do seu código para dentro da máquina virtual
      - name: Checkout do Código
        uses: actions/checkout@v4

      # 3. Instala o Java 17 com otimização de cache do Maven
      - name: Configurar o Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 4. Compila o Auth Service
      - name: Build do Auth Service
        run: |
          cd services/auth-service
          mvn clean compile

      # 5. Compila o Academic Service
      - name: Build do Academic Service
        run: |
          cd services/academic-service
          mvn clean compile

      # 6. Compila o Assignment Service
      - name: Build do Assignment Service
        run: |
          cd services/assignment-service
          mvn clean compile
