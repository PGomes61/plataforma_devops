global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "microsservicos"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets:
          [
            "auth-service:8080",
            "academic-service:8080",
            "assignment-service:8080",
            "api-gateway:8080",
          ]
